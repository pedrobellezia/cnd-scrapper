name: "Solicitação de Outra CND"
description: "Pedir suporte para outras certidões (federais, cartórios, etc.) que ainda não estão mapeadas no sistema."
title: "[Nova Outra CND]: [Nome da Certidão]"
labels: ["cnd-outra", "feature"]

body:
  - type: checkboxes
    id: confirmacoes
    attributes:
      label: Confirmações
      description: Confirme os itens abaixo antes de prosseguir.
      options:
        - label: Substituí "[Nome da Certidão]" no título da issue pelo nome da certidão desejada.
          required: true
        - label: Verifiquei que ainda não existe uma issue para esta CND.
          required: true
        - label: Entendo que informações incorretas ou incompletas podem resultar no fechamento da issue.
          required: true

  - type: input
    id: nome_cnd
    attributes:
      label: "Nome"
      description: "Informe o nome da certidão."
      placeholder: "Ex: Certidão de Falência"
    validations:
      required: true

  - type: input
    id: link_cnd
    attributes:
      label: "Link"
      description: "URL direta para página de emissão da CND."
      placeholder: "https://www.orgao.gov.br/cnd"
    validations:
      required: true

  - type: input
    id: cnpj_teste
    attributes:
      label: "CNPJ"
      description: "Insira um CNPJ válido para testes no desenvolvimento."
      placeholder: "00.000.000/0001-00"
    validations:
      required: true

  - type: textarea
    id: parametros_adicionais
    attributes:
      label: "Parâmetros"
      description: "Caso o portal exija dados adicionais, informe quais são necessários para emitir a CND."
      placeholder: "Ex: Número do processo: 1234567-89.2026.8.26.0000"

  - type: dropdown
    id: captcha_tipo
    attributes:
      label: "CAPTCHA"
      description: "Identifique se a página possui CAPTCHA."
      options:
        - "Não possui"
        - "reCAPTCHA"
        - "hCaptcha"
        - "Cloudflare Turnstile"
        - "CAPTCHA por imagem"
        - "Outro"
    validations:
      required: true

  - type: textarea
    id: exemplo_documento
    attributes:
      label: "Exemplo"
      description: "Anexe um PDF ou uma imagem de uma certidão emitida por esse portal. Lembre-se de ocultar os dados sensíveis antes do envio"
      placeholder: "Arraste o arquivo aqui..."
    validations:
      required: true

  - type: textarea
    id: observacoes
    attributes:
      label: "Observações"